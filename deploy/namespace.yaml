apiVersion: v1
kind: Namespace
metadata:
  name: rails-integration-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rails-cluster-manager
  namespace: rails-integration-system
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rails-cluster-manager
  namespace: rails-integration-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runway-validation-minimal
rules:
  - nonResourceURLs: ["/version"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runway-validation-minimal-binding
subjects:
  - kind: ServiceAccount
    name: rails-cluster-manager
    namespace: rails-integration-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: runway-validation-minimal
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rails-cluster-manager
  namespace: rails-integration-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runway-mvp-cluster-admin
subjects:
  - kind: ServiceAccount
    name: rails-cluster-manager
    namespace: rails-integration-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin