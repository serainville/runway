name: Feature request
description: Propose an improvement to Runway
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please describe the problem and desired outcome from a user perspective.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or operator problem are you trying to solve?
      placeholder: As a platform user, I need ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Runway do?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Mention MVP relevance, guardrails, and non-goals if known
      placeholder: Keep app-centric UX, avoid exposing Kubernetes primitives
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives or workarounds considered?
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?
